         tip:'↑ = breiter suchen (mehr Exploration), ↓ = tiefer in die beste Variante'},
        {key:'mctsRootChildren', label:'Wurzel-Kinder',    step:1,   min:4,   max:40,
         tip:'Kandidaten an der Wurzel — Priors aus MoE-Eval + PolicyNet'},
        {key:'mctsChildren',     label:'Knoten-Kinder',    step:1,   min:2,   max:20,
         tip:'Kandidaten pro innerem Knoten — Priors aus quickEval (rang-basiert)'},
        {key:'mctsRolloutDepth', label:'Rollout-Tiefe',    step:2,   min:4,   max:80,
         tip:'Züge pro Blatt-Simulation. ↓ = mehr Sims, aber verrauschtere Werte'},
        {key:'mctsValueScale',   label:'Wert-Skala',       step:50,  min:50,  max:2000,
         tip:'tanh-Skalierung von evaluateBoard → [−1,1]. ↓ = Werte sättigen schneller'},
      ]
    },
    {
      id:'compute', label:'🔍 Compute-Budget',
      hint:'Nur relevant bei useMCTS=0 (alter Such-Ansatz). CAND = Breite, R = Rollouts pro Kandidat, D = Simulationstiefe. Crisis-Override: bei Atari auf dem Brett schlägt diese Zeile alle anderen.',
      hintOpen: true,
      custom:'crd'
    },
    {
      id:'polnet', label:'🧠 Policy-Netz',
      hint:'3971→128→361 Netz, REINFORCE. Score = (1−blend)·MoE + blend·Prior·scale. Blend wächst automatisch: nach 5 Spielen ~30% Einfluss. Gewichte in localStorage.',
      custom:'pnet'
    },
  ];

  const sidebar = document.querySelector('.sidebar');
  const panel = document.createElement('div');
  panel.className = 'panel'; panel.id = 'pdash';

  let html = `
    <div class="panel-title" onclick="dashToggle()">
      <span>⚙ Parameter</span><span id="pdash-arrow">▸</span>
    </div>
    <div id="pdash-body">

      <div style="font-size:.55rem;color:var(--ui-dim);letter-spacing:.12em;margin-bottom:4px">SPIELSTIL</div>
      <div class="pd-preset-row" id="pd-preset-row">
        <button class="pd-preset-btn" id="pd-preset-ausgeglichen" onclick="dashApplyPreset('ausgeglichen')">⚖ Ausgewogen</button>
        <button class="pd-preset-btn" id="pd-preset-aggressiv" onclick="dashApplyPreset('aggressiv')">⚔ Aggressiv</button>
        <button class="pd-preset-btn" id="pd-preset-defensiv" onclick="dashApplyPreset('defensiv')">🛡 Defensiv</button>
        <button class="pd-preset-btn" id="pd-preset-standard" onclick="dashApplyPreset('standard')">↺ Std</button>
      </div>
      <div id="pd-phase-info">Phase: <span id="pd-phase-badge">Eröffnung</span></div>`;

  const CRD_ROWS = [
    {id:'open',   label:'🌅 Eröffnung', cand:'candOpen',  roll:'rollOpen',  depth:'depthOpen',  scale:''},
    {id:'mid',    label:'⚔️ Mittel',    cand:'candMid',   roll:'rollMid',   depth:'depthMid',   scale:'×f', capRow:[
      {k:'candMidMax',label:'↑Cap',tip:'Kandidaten-Cap'},{k:'rollMidMin',label:'↓Min',tip:'Rollout-Minimum'},{k:'depthMidMax',label:'↑Cap',tip:'Tiefen-Cap'}
    ]},
    {id:'end',    label:'🏁 Endspiel',  cand:'candEnd',   roll:'rollEnd',   depth:'depthEnd',   scale:'×f', capRow:[
      {k:'',label:''},{k:'rollEndMin',label:'↓Min',tip:'Rollout-Minimum'},{k:'depthEndMax',label:'↑Cap',tip:'Tiefen-Cap'}
    ]},
    {id:'crisis', label:'⚡ Crisis',    cand:'crisisCand',roll:'crisisRoll',depth:'crisisDepth', scale:'',  crisis:true},
  ];

  for (const sec of SECTIONS) {
    const hintId = 'pdhint-' + sec.id;
    html += `
      <div class="pd-section">
        <div class="pd-sec-title" onclick="dashSecToggle('${sec.id}')">
          <span>${sec.label}</span>
          <span style="display:flex;align-items:center;gap:4px">
            ${sec.hint ? `<button class="pd-hint-toggle" onclick="event.stopPropagation();dashHintToggle('${hintId}')" title="Hinweis">ℹ</button>` : ''}
            <span class="pd-sec-arrow" id="pdarr-${sec.id}">▸</span>
          </span>
        </div>
        ${sec.hint ? `<div class="pd-sec-hint${sec.hintOpen ? ' show' : ''}" id="${hintId}">${sec.hint}</div>` : ''}
        <div class="pd-rows collapsed" id="pdsec-${sec.id}">`;

    if (sec.custom === 'pnet') {
      html += `
        <div class="pn-stat"><span class="pn-key">Spiele</span><span class="pn-val" id="pn-games">0</span></div>
        <div class="pn-stat"><span class="pn-key">Siege</span><span class="pn-val" id="pn-wins">0</span></div>
        <div class="pn-stat"><span class="pn-key">Netz-Einfluss</span><span class="pn-val" id="pn-blend">0%</span></div>
        <div class="pn-stat"><span class="pn-key">Letztes Spiel</span><span class="pn-val" id="pn-result">—</span></div>
        <div class="pn-bar-track"><div class="pn-bar-fill" id="pn-warmup-bar"></div></div>
        <div class="pd-row"><span class="pd-label">Max. Einfluss</span>
          <input class="pd-input" type="number" id="pd-netMaxBlend" min="0" max="1" step="0.05" value="${PARAMS.netMaxBlend}"
            onchange="dashUpdate('netMaxBlend',this,true)" oninput="dashUpdate('netMaxBlend',this,true)"></div>
        <div class="pd-row"><span class="pd-label">Warmup Spiele</span>
          <input class="pd-input" type="number" id="pd-netWarmup" min="1" max="100" step="1" value="${PARAMS.netWarmup}"
            onchange="dashUpdate('netWarmup',this,false)" oninput="dashUpdate('netWarmup',this,false)"></div>
        <div class="pd-row"><span class="pd-label">Lernrate</span>
          <input class="pd-input" type="number" id="pd-netLR" min="0.0001" max="0.05" step="0.0005" value="${PARAMS.netLR}"
            onchange="dashUpdate('netLR',this,true)" oninput="dashUpdate('netLR',this,true)"></div>
        <div class="pd-row"><span class="pd-label">Score-Skalierung</span>
          <input class="pd-input" type="number" id="pd-netScoreScale" min="500" max="50000" step="500" value="${PARAMS.netScoreScale}"
            onchange="dashUpdate('netScoreScale',this,false)" oninput="dashUpdate('netScoreScale',this,false)"></div>
        <div style="margin-top:8px">
          <button class="pd-reset-btn" style="width:100%" onclick="policyNet.reset();dashRefreshPhase()">🗑 Netz zurücksetzen</button>
        </div>`;
    } else if (sec.custom === 'crd') {
      html += `<table class="pd-crd-table">
        <tr><th></th>
          <th title="Kandidaten-Breite: wie viele der besten Züge überhaupt geprüft werden">CAND</th>
          <th title="Rollouts: wie oft jeder Kandidat simuliert (durchgespielt) wird">R</th>
          <th title="Tiefe: wie viele Züge jede Simulation vorausrechnet">D</th>
        </tr>`;
      for (const row of CRD_ROWS) {
        const lc = row.crisis ? 'pd-crd-label crisis' : 'pd-crd-label';
        const ic = row.crisis ? 'pd-crd-input crisis-input' : 'pd-crd-input';
        html += `<tr>
          <td><span class="${lc}">${row.label} <span class="pd-crd-scale">${row.scale}</span></span></td>
          <td><input class="${ic}" type="number" id="pd-${row.cand}" min="1" max="30" step="1" value="${PARAMS[row.cand]}" onchange="dashCrdUpdate('${row.cand}',this)" oninput="dashCrdUpdate('${row.cand}',this)"></td>
          <td><input class="${ic}" type="number" id="pd-${row.roll}" min="1" max="20" step="1" value="${PARAMS[row.roll]}" onchange="dashCrdUpdate('${row.roll}',this)" oninput="dashCrdUpdate('${row.roll}',this)"></td>
          <td><input class="${ic}" type="number" id="pd-${row.depth}" min="2" max="100" step="2" value="${PARAMS[row.depth]}" onchange="dashCrdUpdate('${row.depth}',this)" oninput="dashCrdUpdate('${row.depth}',this)"></td>
        </tr>`;
        if (row.capRow) {
          html += `<tr style="opacity:.65"><td></td>`;
          for (const cap of row.capRow) {
            if (!cap.k) { html += `<td></td>`; continue; }
            html += `<td><input class="pd-crd-input" type="number" id="pd-${cap.k}" min="1" max="100" step="1" value="${PARAMS[cap.k]}" title="${cap.tip}" onchange="dashCrdUpdate('${cap.k}',this)" oninput="dashCrdUpdate('${cap.k}',this)"></td>`;
          }
          html += `</tr>`;
        }
      }
      html += `</table>`;
    } else {
      for (const p of sec.params) {
        const cls = p.main ? 'pd-row pd-haupthebel' : p.warn ? 'pd-row pd-warn' : 'pd-row';
        const tipId = 'pdtip-' + p.key;
        html += `
          <div class="${cls}">
            <span class="pd-label">${p.label}</span>
            ${p.tip ? `<button class="pd-tip-btn" onclick="dashTipToggle('${tipId}', this)" title="${p.tip}">?</button>` : ''}
            <input class="pd-input" type="number" id="pd-${p.key}"
              step="${p.step}" min="${p.min}" max="${p.max}"
              value="${PARAMS[p.key]}"
              onchange="dashUpdate('${p.key}', this, ${!!p.float})"
              oninput="dashUpdate('${p.key}', this, ${!!p.float})">
          </div>
          ${p.tip ? `<div class="pd-tip-text" id="${tipId}">${p.tip}</div>` : ''}`;
      }
    }
    html += `</div></div>`;
  }

  html += `
      <div class="pd-reset-row">
        <button class="pd-reset-btn" onclick="dashReset()">↺ Reset</button>
        <button class="pd-export-btn" onclick="dashExport()">⬇ Export</button>
      </div>
    </div>`;

  panel.innerHTML = html;
  sidebar.appendChild(panel);

  const PRESETS = {
    ausgeglichen: {
      label: '⚖ Ausgewogen',
      desc: 'Weniger aggressiv. Kürzeres Endspiel.',
      values: {
        crisisLargeSize:    6,
        crisisDragonSize:  12,
        midCapBonus:      580,
        midLibBonus:       48,
        tsumegoCapBonus:  900,
        passGainThreshold: 65,
        endAreaGain:       26,
        endCapBonus:       12,
        passMinMc120:       6,
        passMinMc150:       8,
      }
    },
    aggressiv: {
      label: '⚔ Aggressiv',
      desc: 'Maximal. Viele Captures, Kämpfe früh.',
      values: {
        crisisLargeSize:   3,
        crisisDragonSize:  6,
        midCapBonus:     1100,
        midLibBonus:      20,
        tsumegoCapBonus: 1500,
        tsumegoAtariSet:  650,
        passGainThreshold: 90,
        endAreaGain:      35,
      }
    },
    defensiv: {
      label: '🛡 Defensiv',
      desc: 'Sicherheit zuerst. Eigene Gruppen retten.',
      values: {
        crisisLargeSize:   8,
        crisisDragonSize: 14,
        midCapBonus:     450,
        midLibBonus:      60,
        midRescueAtari:  500,
        tsumegoCapBonus: 700,
        tsumegoRescue3:  900,
        passGainThreshold: 55,
        endAreaGain:      25,
      }
    },
    standard: {
      label: '↺ Standard',
      desc: 'Alle Werte auf Original zurücksetzen.',
      values: null
    }
  };

  window.dashApplyPreset = function(name) {
    const preset = PRESETS[name];
    if (!preset) return;
    if (preset.values === null) {
      dashReset();
    } else {
      Object.assign(PARAMS, preset.values);
      for (const [k,v] of Object.entries(preset.values)) {
        const inp = document.getElementById('pd-' + k);
        if (inp) {
          inp.value = v;
          inp.classList.toggle('changed', Math.abs(v - PARAMS_DEFAULT[k]) > 1e-9);
        }
      }
    }
    document.querySelectorAll('.pd-preset-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('pd-preset-' + name)?.classList.add('active');
    dashRefreshPhase();
  };

  window.dashToggle = function() {
    const body = document.getElementById('pdash-body');
    const arrow = document.getElementById('pdash-arrow');
    const open = body.classList.toggle('open');
    arrow.textContent = open ? '▾' : '▸';
    if (open) dashRefreshPhase();
  };

  window.dashSecToggle = function(id) {
    const rows = document.getElementById('pdsec-' + id);
    const arr  = document.getElementById('pdarr-' + id);
    const c = rows.classList.toggle('collapsed');
    arr.textContent = c ? '▸' : '▾';
  };

  window.dashCrdUpdate = function(key, input) {
    const raw = parseInt(input.value.replace(',','.'), 10);
    if (isNaN(raw) || raw <= 0) return;
    PARAMS[key] = raw;
    input.classList.toggle('changed', raw !== PARAMS_DEFAULT[key]);
  };

  window.dashTipToggle = function(tipId, btn) {
    const el = document.getElementById(tipId);
    if (!el) return;
    const show = el.classList.toggle('show');
    btn.classList.toggle('active', show);
  };

  window.dashHintToggle = function(hintId) {
    const el = document.getElementById(hintId);
    if (el) el.classList.toggle('show');
  };

  window.dashUpdate = function(key, input, isFloat) {
    const valStr = input.value.replace(',', '.');
    let raw = isFloat ? parseFloat(valStr) : parseInt(valStr, 10);
    if (isNaN(raw)) return;
    const mn = input.min !== '' ? parseFloat(input.min) : -Infinity;
    const mx = input.max !== '' ? parseFloat(input.max) : Infinity;
    raw = Math.min(mx, Math.max(mn, raw));
    PARAMS[key] = raw;
    const changed = Math.abs(raw - PARAMS_DEFAULT[key]) > 1e-9;
    input.classList.toggle('changed', changed);
    if (key === 'rolloutWeight' || key === 'scoreWeight') {
      /* Bidirektionaler Sync: egal welcher der beiden geändert wird,
         der jeweils andere folgt, sodass die Summe immer 1 bleibt.
         Vorher lief der Sync nur rollout→score; eine Änderung an
         scoreWeight ließ die Summe unbemerkt von 1 abweichen. */
      const clamped = Math.min(1, Math.max(0, raw));
      const other = key === 'rolloutWeight' ? 'scoreWeight' : 'rolloutWeight';
      PARAMS[key] = clamped;
      input.value = clamped;
      PARAMS[other] = parseFloat((1 - clamped).toFixed(4));
      const otherInput = document.getElementById('pd-' + other);
      if (otherInput) {
        otherInput.value = PARAMS[other];
        otherInput.classList.toggle('changed', Math.abs(PARAMS[other] - PARAMS_DEFAULT[other]) > 1e-9);
      }
    }
    dashRefreshPhase();
  };

  window.dashRefreshPhase = function() {
    const badge = document.getElementById('pd-phase-badge');
    if (!badge || typeof state === 'undefined') return;
    const mc = state.moveCount;
    const empty = 361 - Array.from(state.board).filter(v=>v>0).length;
    /* Live-Mix der Experten anzeigen (Soft-Gating) */
    const {wOpen, wMid, wEnd} = phaseWeights(mc, empty);
    const phase = (wEnd >= wOpen && wEnd >= wMid) ? 'Endspiel'
                : (wOpen >= wMid) ? 'Eröffnung' : 'Mittelspiel';
    const parts = [];
    if (wOpen > 0.02) parts.push(`Ö ${Math.round(wOpen*100)}%`);
    if (wMid  > 0.02) parts.push(`M ${Math.round(wMid*100)}%`);
    if (wEnd  > 0.02) parts.push(`E ${Math.round(wEnd*100)}%`);
    badge.textContent = (parts.length > 1 ? parts.join(' · ') : phase) + ' (Zug ' + mc + ')';
    const col = phase==='Eröffnung'?'rgba(39,174,96,.15)':phase==='Mittelspiel'?'rgba(200,160,90,.12)':'rgba(192,57,43,.12)';
    const brd = phase==='Eröffnung'?'rgba(39,174,96,.3)':phase==='Mittelspiel'?'rgba(200,160,90,.3)':'rgba(192,57,43,.3)';
    const txt = phase==='Eröffnung'?'var(--green)':phase==='Mittelspiel'?'var(--wood-light)':'var(--red)';
    badge.style.cssText=`display:inline-block;padding:1px 6px;border-radius:2px;margin-left:4px;font-size:.55rem;background:${col};color:${txt};border:1px solid ${brd}`;
    if (window.policyNet) policyNet.dashUpdate();
  };

  window.dashReset = function() {
    Object.assign(PARAMS, PARAMS_DEFAULT);
    for (const key of Object.keys(PARAMS_DEFAULT)) {
      const inp = document.getElementById('pd-' + key);
      if (inp) { inp.value = PARAMS[key]; inp.classList.remove('changed'); }
    }
    for (const sec of SECTIONS)
      if (sec.params) for (const p of sec.params) {
        const inp = document.getElementById('pd-' + p.key);
        if (inp) { inp.value = PARAMS[p.key]; inp.classList.remove('changed'); }
      }
    document.querySelectorAll('.pd-preset-btn').forEach(b=>b.classList.remove('active'));
    dashRefreshPhase();
  };

  window.dashExport = function() {
    const lines = [
      '// Go KI — Parameter-Snapshot',
      `// Stand: Zug ${typeof state!=='undefined'?state.moveCount:0}`,
      '// Haupthebel: endAreaGain (×30), passGainThreshold, aiTimeBudget',
      'globalThis.PARAMS = {'
    ];
    for (const [k,v] of Object.entries(PARAMS)) lines.push(`  ${k}: ${v},`);
    lines.push('};');
    const txt = lines.join('\n');
    navigator.clipboard.writeText(txt).catch(()=>{});
    const btn = document.querySelector('.pd-export-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Kopiert'; btn.style.color='var(--green)';
    setTimeout(()=>{ btn.textContent=orig; btn.style.color=''; },1500);
  };

  const origUpdateUI = window.updateUI;
  if (typeof origUpdateUI === 'function') {
    window.updateUI = function(...args) { origUpdateUI(...args); dashRefreshPhase(); };
  }
})();
</script>
</body>
</html>
